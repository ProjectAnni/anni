  border-color: var(--ring);
  box-shadow: inset 0 0 0 1px var(--ring);
}

.form-range::-moz-range-track {
  height: 28px;
  background: transparent;
}

.form-range::-moz-range-thumb {
  width: 20px;
  height: 20px;
  border: 1px solid var(--border);
  border-radius: var(--radius-full);
  background: light-dark(var(--primary-foreground), var(--foreground));
}

.form-range:focus-visible::-moz-range-thumb {
  border-color: var(--ring);
  box-shadow: inset 0 0 0 1px var(--ring);
}

.form-range:disabled {
  cursor: not-allowed;
  opacity: 0.4;
}

.btn:not(.btn-primary, .viz-tile):is(
    [aria-pressed=&quot;true&quot;],
    [aria-selected=&quot;true&quot;],
    .is-selected
  ) {
  border-color: var(--primary);
  color: var(--primary-foreground);
  background: var(--primary);
}

.btn.viz-tile:is([aria-pressed=&quot;true&quot;], [aria-selected=&quot;true&quot;], .is-selected) {
  border-color: var(--primary);
  box-shadow: inset 0 0 0 1px var(--primary);
}

.btn:focus-visible {
  outline: 2px solid var(--ring);
  outline-offset: 2px;
}

svg {
  display: block;
  max-width: 100%;
  height: auto;
}

#widget &gt; svg {
  width: 100%;
}

.text-warning,
.text-destructive {
  color: var(--destructive);
}

&lt;body&gt;
&lt;style&gt;
@import url(&quot;https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&amp;family=Noto+Sans+SC:wght@400;500&amp;display=swap&quot;);

#anni-workflow-visual {
  --workflow-font: &quot;Noto Sans SC&quot;, var(--font-sans);
  --workflow-mono: &quot;IBM Plex Mono&quot;, var(--font-mono);
  display: flex;
  width: 100%;
  flex-direction: column;
  gap: 30px;
  color: var(--foreground);
  font-family: var(--workflow-font);
}

#anni-workflow-visual .section-heading {
  display: grid;
  gap: 6px;
  max-width: 68ch;
}

#anni-workflow-visual .section-kicker,
#anni-workflow-visual .goal-label,
#anni-workflow-visual .detail-label,
#anni-workflow-visual .signal-status,
#anni-workflow-visual .phase-number {
  font-family: var(--workflow-mono);
  letter-spacing: 0.04em;
}

#anni-workflow-visual .section-kicker,
#anni-workflow-visual .goal-label,
#anni-workflow-visual .detail-label,
#anni-workflow-visual .signal-status {
  color: var(--muted-foreground);
}

#anni-workflow-visual .goal-grid {
  margin-top: 14px;
}

#anni-workflow-visual .goal-grid .card {
  min-height: 116px;
}

#anni-workflow-visual .goal-mark {
  display: inline-block;
  width: 28px;
  height: 3px;
  margin-bottom: 14px;
  background: var(--viz-series-1);
}

#anni-workflow-visual .goal-grid .card:nth-child(2) .goal-mark {
  background: var(--viz-series-3);
}

#anni-workflow-visual .goal-grid .card:nth-child(3) .goal-mark {
  background: var(--viz-series-6);
}

#anni-workflow-visual .goal-context {
  margin-top: 5px;
}

#anni-workflow-visual .signal-map {
  position: relative;
  display: grid;
  grid-template-columns: repeat(4, minmax(0, 1fr));
  gap: 14px;
  margin-top: 24px;
  padding-top: 4px;
}

#anni-workflow-visual .signal-map::before {
  position: absolute;
  top: 14px;
  right: 12.5%;
  left: 12.5%;
  height: 2px;
  background: var(--border);
  content: &quot;&quot;;
}

#anni-workflow-visual .signal-node {
  position: relative;
  display: flex;
  min-width: 0;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  color: var(--muted-foreground);
  text-align: center;
  transition:
    color 180ms ease,
    transform 180ms ease;
}

#anni-workflow-visual .signal-dot {
  z-index: 1;
  width: 22px;
  height: 22px;
  margin-bottom: 7px;
  border: 2px solid var(--border);
  border-radius: 50%;
  background: var(--background);
  transition:
    border-color 180ms ease,
    background-color 180ms ease,
    box-shadow 180ms ease;
}

#anni-workflow-visual .signal-node.is-active {
  color: var(--foreground);
  transform: translateY(-2px);
}

#anni-workflow-visual .signal-node.is-active .signal-dot {
  border-color: var(--primary);
  background: var(--primary);
  box-shadow: 0 0 0 5px color-mix(in srgb, var(--primary) 16%, transparent);
}

#anni-workflow-visual .signal-copy {
  max-width: 20ch;
}

#anni-workflow-visual .signal-status {
  margin-top: 4px;
}

#anni-workflow-visual .boundary-list {
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  gap: 8px 18px;
  margin: 18px 0 0;
  padding: 14px 0 0;
  border-top: 1px solid var(--border);
  list-style: none;
}

#anni-workflow-visual .boundary-list li {
  display: grid;
  grid-template-columns: auto minmax(0, 1fr);
  gap: 8px;
}

#anni-workflow-visual .boundary-symbol {
  color: var(--primary);
  font-family: var(--workflow-mono);
}

#anni-workflow-visual .stage-header {
  display: flex;
  flex-wrap: wrap;
  align-items: end;
  justify-content: space-between;
  gap: 12px;
}

#anni-workflow-visual .stage-position {
  min-width: min(100%, 210px);
  text-align: right;
}

#anni-workflow-visual .stage-position-label {
  margin-bottom: 6px;
  font-family: var(--workflow-mono);
}

#anni-workflow-visual .progress-track {
  width: 100%;
  height: 4px;
  overflow: hidden;
  border-radius: var(--radius-full);
  background: var(--muted);
}

#anni-workflow-visual .progress-value {
  width: 0;
  height: 100%;
  border-radius: inherit;
  background: var(--viz-series-1);
  transition: width 220ms ease;
}

#anni-workflow-visual .group-legend {
  display: flex;
  flex-wrap: wrap;
  gap: 7px 14px;
  margin-top: 14px;
}

#anni-workflow-visual .group-key {
  display: inline-flex;
  align-items: center;
  gap: 6px;
}

#anni-workflow-visual .group-dot {
  width: 8px;
  height: 8px;
  flex: 0 0 auto;
  border-radius: 50%;
  background: var(--group-color);
}

#anni-workflow-visual .group-catalog {
  --group-color: var(--viz-series-6);
}

#anni-workflow-visual .group-intake {
  --group-color: var(--viz-series-2);
}

#anni-workflow-visual .group-evidence {
  --group-color: var(--viz-series-5);
}

#anni-workflow-visual .group-media {
  --group-color: var(--viz-series-3);
}

#anni-workflow-visual .group-publish {
  --group-color: var(--viz-series-1);
}

#anni-workflow-visual .stage-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(92px, 1fr));
  gap: 8px;
  margin-top: 12px;
}

#anni-workflow-visual .stage-button .group-dot {
  width: 7px;
  height: 7px;
}

#anni-workflow-visual .stage-detail {
  display: grid;
  gap: 18px;
  margin-top: 14px;
}

#anni-workflow-visual .stage-detail-head {
  display: flex;
  flex-wrap: wrap;
  align-items: flex-start;
  justify-content: space-between;
  gap: 12px;
}

#anni-workflow-visual .stage-title-wrap {
  display: grid;
  max-width: 54ch;
  gap: 6px;
}

#anni-workflow-visual .owner-list {
  justify-content: flex-end;
}

#anni-workflow-visual .detail-grid {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 0 20px;
}

#anni-workflow-visual .detail-block {
  min-width: 0;
  padding: 13px 0;
  border-top: 1px solid var(--border);
}

#anni-workflow-visual .detail-block p + p {
  margin-top: 4px;
}

#anni-workflow-visual .outcome-line {
  display: grid;
  grid-template-columns: minmax(100px, 0.28fr) minmax(0, 1fr);
  gap: 14px;
  padding-left: 12px;
  border-left: 3px solid var(--viz-series-3);
}

#anni-workflow-visual details {
  padding-top: 12px;
  border-top: 1px solid var(--border);
}

#anni-workflow-visual summary {
  cursor: pointer;
  font-weight: 500;
}

#anni-workflow-visual .technical-grid {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 12px 20px;
  margin-top: 12px;
}

#anni-workflow-visual .roadmap {
  position: relative;
  display: grid;
  gap: 0;
  margin: 16px 0 0;
  padding: 0;
  list-style: none;
}

#anni-workflow-visual .roadmap::before {
  position: absolute;
  top: 12px;
  bottom: 12px;
  left: 17px;
  width: 2px;
  background: var(--border);
  content: &quot;&quot;;
}

#anni-workflow-visual .roadmap-item {
  position: relative;
  display: grid;
  grid-template-columns: 36px minmax(0, 1fr);
  gap: 14px;
  padding: 0 0 20px;
}

#anni-workflow-visual .roadmap-item:last-child {
  padding-bottom: 0;
}

#anni-workflow-visual .phase-number {
  z-index: 1;
  display: grid;
  width: 36px;
  height: 36px;
  place-items: center;
  border: 2px solid var(--border);
  border-radius: 50%;
  color: var(--foreground);
  background: var(--background);
}

#anni-workflow-visual .roadmap-item:first-child .phase-number {
  border-color: var(--viz-series-2);
}

#anni-workflow-visual .roadmap-item:not(:first-child) .phase-number {
  border-color: var(--primary);
}

#anni-workflow-visual .phase-copy {
  display: grid;
  gap: 5px;
  padding-top: 5px;
}

#anni-workflow-visual .phase-result {
  color: var(--foreground);
}

#anni-workflow-visual .safety-footer {
  display: grid;
  grid-template-columns: auto minmax(0, 1fr);
  gap: 10px;
  align-items: start;
  padding-top: 16px;
  border-top: 1px solid var(--border);
}

#anni-workflow-visual .safety-mark {
  color: var(--viz-series-3);
  font-family: var(--workflow-mono);
}

@media (max-width: 620px) {
  #anni-workflow-visual .signal-map {
    grid-template-columns: 1fr;
    gap: 0;
    padding-top: 0;
  }

  #anni-workflow-visual .signal-map::before {
    top: 11px;
    right: auto;
    bottom: 11px;
    left: 10px;
    width: 2px;
    height: auto;
  }

  #anni-workflow-visual .signal-node {
    display: grid;
    grid-template-columns: 22px minmax(0, 1fr);
    grid-template-rows: auto auto auto;
    gap: 2px 12px;
    align-items: start;
    padding: 0 0 18px;
    text-align: left;
  }

  #anni-workflow-visual .signal-node:last-child {
    padding-bottom: 0;
  }

  #anni-workflow-visual .signal-node.is-active {
    transform: translateX(2px);
  }

  #anni-workflow-visual .signal-dot {
    grid-row: 1 / 4;
    margin: 0;
  }

  #anni-workflow-visual .signal-copy {
    max-width: none;
  }

  #anni-workflow-visual .boundary-list,
  #anni-workflow-visual .detail-grid,
  #anni-workflow-visual .technical-grid {
    grid-template-columns: 1fr;
  }

  #anni-workflow-visual .stage-position {
    width: 100%;
    text-align: left;
  }

  #anni-workflow-visual .owner-list {
    justify-content: flex-start;
  }

  #anni-workflow-visual .outcome-line {
    grid-template-columns: 1fr;
    gap: 4px;
  }
}

@media (prefers-reduced-motion: reduce) {
  #anni-workflow-visual .signal-node,
  #anni-workflow-visual .signal-dot,
  #anni-workflow-visual .progress-value {
    transition: none;
  }
}

&lt;div id=&quot;anni-workflow-visual&quot;&gt;

      &lt;button class=&quot;btn viz-tile stage-button group-media&quot; type=&quot;button&quot; data-stage=&quot;7&quot; aria-pressed=&quot;false&quot;&gt;&lt;span class=&quot;group-dot&quot; aria-hidden=&quot;true&quot;&gt;&lt;/span&gt;7 · 拆轨&lt;/button&gt;

      &lt;button class=&quot;btn viz-tile stage-button group-media&quot; type=&quot;button&quot; data-stage=&quot;9&quot; aria-pressed=&quot;false&quot;&gt;&lt;span class=&quot;group-dot&quot; aria-hidden=&quot;true&quot;&gt;&lt;/span&gt;9 · 验证&lt;/button&gt;
      &lt;button class=&quot;btn viz-tile stage-button group-publish&quot; type=&quot;button&quot; data-stage=&quot;10&quot; aria-pressed=&quot;false&quot;&gt;&lt;span class=&quot;group-dot&quot; aria-hidden=&quot;true&quot;&gt;&lt;/span&gt;10 · 发布&lt;/button&gt;

        &lt;section class=&quot;detail-block&quot;&gt;

      &lt;/div&gt;

        &lt;/div&gt;
      &lt;/details&gt;

  &lt;/section&gt;

  &lt;section aria-labelledby=&quot;workflow-roadmap-heading&quot;&gt;
    &lt;div class=&quot;section-heading&quot;&gt;
      &lt;p class=&quot;section-kicker text-small&quot;&gt;系统如何逐步建成&lt;/p&gt;
      &lt;h2 id=&quot;workflow-roadmap-heading&quot;&gt;这条建设路线不是单张专辑的入库流程&lt;/h2&gt;
      &lt;p class=&quot;text-muted&quot;&gt;Phase 0 先消除现有文件风险；Phase 1 就交付 Web + Backend + Worker 的最小闭环，后续再增加智能化、收藏全景和协作能力。&lt;/p&gt;
    &lt;/div&gt;

    &lt;ol class=&quot;roadmap&quot;&gt;
      &lt;li class=&quot;roadmap-item&quot;&gt;
        &lt;span class=&quot;phase-number&quot;&gt;0&lt;/span&gt;
        &lt;div class=&quot;phase-copy&quot;&gt;
          &lt;h3&gt;安全基础&lt;/h3&gt;
          &lt;p&gt;修复默认删源、伪 dry-run、原地覆盖、错误吞噬和非事务提交；建立 plan、capability 与 receipt。&lt;/p&gt;
          &lt;p class=&quot;phase-result&quot;&gt;&lt;strong&gt;完成标志：&lt;/strong&gt;故障注入下 originals 仍完整，危险 legacy 路径被修复或代码级禁用。&lt;/p&gt;
        &lt;/div&gt;
      &lt;/li&gt;
      &lt;li class=&quot;roadmap-item&quot;&gt;
        &lt;span class=&quot;phase-number&quot;&gt;1&lt;/span&gt;
        &lt;div class=&quot;phase-copy&quot;&gt;
          &lt;h3&gt;最小 server-client 闭环&lt;/h3&gt;
          &lt;p&gt;交付最小 &lt;code&gt;anni-web&lt;/code&gt;、扩展 &lt;code&gt;annim&lt;/code&gt;，并建立单 Worker、Object Store、审核和发布流程。&lt;/p&gt;
          &lt;p class=&quot;phase-result&quot;&gt;&lt;strong&gt;完成标志：&lt;/strong&gt;一张 WAV + CUE + Booklet 专辑无需手工串 CLI 即可安全发布。&lt;/p&gt;
        &lt;/div&gt;
      &lt;/li&gt;
      &lt;li class=&quot;roadmap-item&quot;&gt;
        &lt;span class=&quot;phase-number&quot;&gt;2&lt;/span&gt;
        &lt;div class=&quot;phase-copy&quot;&gt;
          &lt;h3&gt;智能整理与封面&lt;/h3&gt;
          &lt;p&gt;加入 Booklet OCR、网络 Agent、字段冲突审核、TrackType 编辑、封面候选与实时事件。&lt;/p&gt;
          &lt;p class=&quot;phase-result&quot;&gt;&lt;strong&gt;完成标志：&lt;/strong&gt;AI 减少抄录，但正式决定仍由人批准并可完整追溯。&lt;/p&gt;
        &lt;/div&gt;
      &lt;/li&gt;
      &lt;li class=&quot;roadmap-item&quot;&gt;
        &lt;span class=&quot;phase-number&quot;&gt;3&lt;/span&gt;
        &lt;div class=&quot;phase-copy&quot;&gt;
          &lt;h3&gt;Artist 收藏全景&lt;/h3&gt;
          &lt;p&gt;完成多信源目录同步、缺失/升级提醒、音质来源记录和 CSV/XLSX 异步导出。&lt;/p&gt;
          &lt;p class=&quot;phase-result&quot;&gt;&lt;strong&gt;完成标志：&lt;/strong&gt;拉表由 Backend ledger 自动生成，不再维护第二份手工真值。&lt;/p&gt;
        &lt;/div&gt;
      &lt;/li&gt;
      &lt;li class=&quot;roadmap-item&quot;&gt;
        &lt;span class=&quot;phase-number&quot;&gt;4&lt;/span&gt;
        &lt;div class=&quot;phase-copy&quot;&gt;
          &lt;h3&gt;协作与规模化&lt;/h3&gt;
          &lt;p&gt;增加完整 RBAC、多人审核、多 Worker、PostgreSQL、S3-compatible Object Store、集中审计和灾备。&lt;/p&gt;
          &lt;p class=&quot;phase-result&quot;&gt;&lt;strong&gt;完成标志：&lt;/strong&gt;短时故障可恢复，不重复发布，也不损坏原件。&lt;/p&gt;
        &lt;/div&gt;
      &lt;/li&gt;
    &lt;/ol&gt;
  &lt;/section&gt;

  &lt;div class=&quot;safety-footer&quot;&gt;
    &lt;span class=&quot;safety-mark&quot; aria-hidden=&quot;true&quot;&gt;SAFE&lt;/span&gt;
    &lt;p&gt;&lt;strong&gt;贯穿所有阶段的底线：&lt;/strong&gt;中点统一为 &lt;code&gt;・&lt;/code&gt;、波浪线统一为 &lt;code&gt;～&lt;/code&gt; 是既定规范，不是冲突；原始文字保留在 evidence，原始音频始终只读保留。&lt;/p&gt;
  &lt;/div&gt;
&lt;/div&gt;

      purpose: &quot;让 Repo、音频库和 ledger 最终一致，同时保留完整恢复证据。&quot;,
      user: &quot;具备权限的 reviewer/operator 查看最终摘要并执行明确的二次确认。&quot;,
      backend: &quot;核对 plan_hash + verify_hash，签发一次性 commit capability，更新 ledger/outbox 并发布事件。&quot;,
      worker: &quot;以 no-replace Saga 提交 Repo 与音频库，上报每一步 receipt；失败时向前恢复而不是删除回滚。&quot;,
      artifact: &quot;Repo/audio/ledger receipts、published revision、audit events 与 annil reload receipt。&quot;,
      done: &quot;三方 receipt 已对账，Job 为 published，成品可见，originals 继续保留。&quot;,
      blocked: &quot;批准失效、capability 过期、目标存在不同内容、锁冲突或 commit/ledger 失败。&quot;,
      modules: &quot;Publish UI、Saga Coordinator、Queue/Outbox、Commit Worker/Journal、anni-repo、Audio Library、Ledger、annil。&quot;,
      owners: [&quot;web&quot;, &quot;backend&quot;, &quot;worker&quot;, &quot;publish&quot;]
    }
  ];

  const ownerNames = {
    web: &quot;Web&quot;,
    backend: &quot;Backend&quot;,
    worker: &quot;Worker&quot;,
    publish: &quot;发布结果&quot;
  };

  const fields = {
    badge: root.querySelector(&quot;#stage-badge&quot;),
    title: root.querySelector(&quot;#stage-title&quot;),
    purpose: root.querySelector(&quot;#stage-purpose&quot;),
    user: root.querySelector(&quot;#stage-user-action&quot;),
    backend: root.querySelector(&quot;#stage-backend-action&quot;),
    worker: root.querySelector(&quot;#stage-worker-action&quot;),
    artifact: root.querySelector(&quot;#stage-artifact&quot;),
    done: root.querySelector(&quot;#stage-done&quot;),
    modules: root.querySelector(&quot;#stage-modules&quot;),
    blocked: root.querySelector(&quot;#stage-blocked&quot;),
    owners: root.querySelector(&quot;#stage-owners&quot;),
    position: root.querySelector(&quot;#stage-position-label&quot;),
    progress: root.querySelector(&quot;#stage-progress-value&quot;),
    progressTrack: root.querySelector(&quot;.progress-track&quot;)
  };

  const buttons = Array.from(root.querySelectorAll(&quot;[data-stage]&quot;));
  const signalNodes = Array.from(root.querySelectorAll(&quot;[data-role]&quot;));

  const setText = (element, value) =&gt; {
    if (element != null) element.textContent = value;
  };

  const renderStage = (index) =&gt; {
    const stage = stages[index];
    if (stage == null) return;

    buttons.forEach((button) =&gt; {
      button.setAttribute(
        &quot;aria-pressed&quot;,
        Number(button.getAttribute(&quot;data-stage&quot;)) === index ? &quot;true&quot; : &quot;false&quot;
      );
    });

    signalNodes.forEach((node) =&gt; {
      node.classList.toggle(&quot;is-active&quot;, stage.owners.includes(node.getAttribute(&quot;data-role&quot;)));
    });

    setText(fields.badge, &quot;阶段 &quot; + index + &quot; · &quot; + stage.group);
    setText(fields.title, stage.title);
    setText(fields.purpose, stage.purpose);
    setText(fields.user, stage.user);
    setText(fields.backend, stage.backend);
    setText(fields.worker, stage.worker);
    setText(fields.artifact, stage.artifact);
    setText(fields.done, stage.done);
    setText(fields.modules, stage.modules);
    setText(fields.blocked, stage.blocked);
    setText(fields.position, index === 0 ? &quot;阶段 0 · 持续目录&quot; : &quot;单张专辑流程 · &quot; + index + &quot; / 10&quot;);

    if (fields.progress != null) fields.progress.style.width = String(index * 10) + &quot;%&quot;;
    if (fields.progressTrack != null) fields.progressTrack.setAttribute(&quot;aria-valuenow&quot;, String(index));

    if (fields.owners != null) {
      fields.owners.replaceChildren();
      stage.owners.forEach((owner) =&gt; {
        const chip = document.createElement(&quot;span&quot;);
        chip.className = &quot;viz-badge&quot;;
        chip.textContent = ownerNames[owner];
        fields.owners.appendChild(chip);
      });
    }

  };

  buttons.forEach((button) =&gt; {
    button.addEventListener(&quot;click&quot;, () =&gt; {
      renderStage(Number(button.getAttribute(&quot;data-stage&quot;)));
    });
  });

  renderStage(0);
})();
&lt;/script&gt;

&lt;script src=&quot;https://unpkg.com/@floating-ui/core@1.7.3/dist/floating-ui.core.umd.min.js&quot;&gt;&lt;/script&gt;
&lt;script src=&quot;https://unpkg.com/@floating-ui/dom@1.7.4/dist/floating-ui.dom.umd.min.js&quot;&gt;&lt;/script&gt;
&lt;script&gt;
(() =&gt; {
  if (window.FloatingUIDOM == null) {
    return;
  }
  const { autoUpdate, computePosition, flip, offset, shift, size } =
    window.FloatingUIDOM;
  const tooltipPlacements = new Set([&quot;top&quot;, &quot;right&quot;, &quot;bottom&quot;, &quot;left&quot;]);
  const tooltipId = `codex-visualization-tooltip-${
    window.crypto?.randomUUID?.() ?? Date.now().toString(36)
  }`;
  const tooltipGap = 5;
  const hoverDelay = 700;
  const skipDelay = 300;
  let activeTrigger = null;
  let pendingTrigger = null;
  let tooltip = null;
  let openTimeout = null;
  let autoUpdateCleanup = null;
  let positionRequest = 0;
  let skipDelayUntil = 0;

  const getTrigger = (target) =&gt;
    target?.nodeType === Node.ELEMENT_NODE
      ? target.closest(&quot;[data-tooltip]&quot;)
      : null;
  const containsTarget = (trigger, target) =&gt;
    target?.nodeType != null &amp;&amp; trigger.contains(target);
  const getContent = (trigger) =&gt;
    trigger.getAttribute(&quot;data-tooltip&quot;)?.trim() ?? &quot;&quot;;
  const getPlacement = (trigger) =&gt; {
    const placement = trigger.getAttribute(&quot;data-tooltip-placement&quot;);
    return tooltipPlacements.has(placement) ? placement : &quot;top&quot;;
  };
  const getTooltip = () =&gt; {
    if (tooltip == null) {
      tooltip = document.createElement(&quot;div&quot;);
      tooltip.id = tooltipId;
      tooltip.className = &quot;tooltip&quot;;
      tooltip.setAttribute(&quot;role&quot;, &quot;tooltip&quot;);
    }
    return tooltip;
  };
  const setDescribedBy = (trigger, described) =&gt; {
    const ids = new Set(
      (trigger.getAttribute(&quot;aria-describedby&quot;) ?? &quot;&quot;)
        .split(/\s+/)
        .filter(Boolean),
    );
    if (described) {
      ids.add(tooltipId);
    } else {
      ids.delete(tooltipId);
    }
    if (ids.size === 0) {
      trigger.removeAttribute(&quot;aria-describedby&quot;);
    } else {
      trigger.setAttribute(&quot;aria-describedby&quot;, [...ids].join(&quot; &quot;));
    }
  };
  const clearOpenTimeout = () =&gt; {
    if (openTimeout != null) {
      window.clearTimeout(openTimeout);
      openTimeout = null;
    }
    pendingTrigger = null;
  };
  const closeTooltip = (activateSkipDelay = true) =&gt; {
    clearOpenTimeout();
    positionRequest += 1;
    autoUpdateCleanup?.();
    autoUpdateCleanup = null;
    if (activeTrigger == null) {
      return;
    }
    setDescribedBy(activeTrigger, false);
    activeTrigger = null;
    tooltip?.remove();
    if (activateSkipDelay) {
      skipDelayUntil = Date.now() + skipDelay;
    }
  };
  const updatePosition = (trigger, floating) =&gt; {
    const request = ++positionRequest;
    void computePosition(trigger, floating, {
      middleware: [
        offset(tooltipGap),
        flip({ padding: tooltipGap }),
        shift({ padding: tooltipGap }),
        size({
          padding: tooltipGap,
          apply({ availableHeight, availableWidth, elements }) {
            elements.floating.style.setProperty(
              &quot;--tooltip-available-width&quot;,
              `${Math.max(0, availableWidth)}px`,
            );
            elements.floating.style.setProperty(
              &quot;--tooltip-available-height&quot;,
              `${Math.max(0, availableHeight)}px`,
            );
          },
        }),
      ],
      placement: getPlacement(trigger),
      strategy: &quot;fixed&quot;,
    })
      .then(({ x, y }) =&gt; {
        if (activeTrigger !== trigger || request !== positionRequest) {
          return;
        }
        const scale = window.devicePixelRatio || 1;
        floating.style.transform = `translate(${Math.round(x * scale) / scale}px, ${Math.round(y * scale) / scale}px)`;
        floating.style.visibility = &quot;visible&quot;;
      })
      .catch(() =&gt; {
        if (activeTrigger === trigger &amp;&amp; request === positionRequest) {
          closeTooltip(false);
        }
      });
  };
  const openTooltip = (trigger) =&gt; {
    const content = getContent(trigger);
    if (!trigger.isConnected || content.length === 0) {
      return;
    }
    clearOpenTimeout();
    if (activeTrigger === trigger) {
      return;
    }
    closeTooltip();
    const floating = getTooltip();
    floating.textContent = content;
    floating.style.visibility = &quot;hidden&quot;;
    floating.style.transform = &quot;translate(0, 0)&quot;;
    document.body.appendChild(floating);
    activeTrigger = trigger;
    setDescribedBy(trigger, true);
    autoUpdateCleanup = autoUpdate(trigger, floating, () =&gt; {
      updatePosition(trigger, floating);
    });
  };
  const requestOpen = (trigger, immediate = false) =&gt; {
    if (
      getContent(trigger).length === 0 ||
      activeTrigger === trigger ||
      pendingTrigger === trigger
    ) {
      return;
    }
    clearOpenTimeout();
    pendingTrigger = trigger;
    const delay =
      immediate || activeTrigger != null || Date.now() &lt; skipDelayUntil
        ? 0
        : hoverDelay;
    if (delay === 0) {
      openTooltip(trigger);
      return;
    }
    openTimeout = window.setTimeout(() =&gt; {
      openTimeout = null;
      pendingTrigger = null;
      openTooltip(trigger);
    }, delay);
  };
  const handlePointerOpen = (event) =&gt; {
    if (event.pointerType === &quot;touch&quot;) {
      return;
    }
    const trigger = getTrigger(event.target);
    if (trigger == null || containsTarget(trigger, event.relatedTarget)) {
      return;
    }
    requestOpen(trigger);
  };
  const handleLeave = (event) =&gt; {
    const trigger = getTrigger(event.target);
    if (trigger == null || containsTarget(trigger, event.relatedTarget)) {
      return;
    }
    if (activeTrigger === trigger || pendingTrigger === trigger) {
      closeTooltip();
    }
  };
  const handleFocusIn = (event) =&gt; {
    const trigger = getTrigger(event.target);
    if (trigger?.matches(&quot;:focus-visible&quot;)) {
      requestOpen(trigger, true);
    }
  };
  const handleKeyDown = (event) =&gt; {
    if (event.key === &quot;Escape&quot;) {
      closeTooltip();
    }
  };
  const handleContextMenu = (event) =&gt; {
    const trigger = getTrigger(event.target);
    if (activeTrigger === trigger || pendingTrigger === trigger) {
      closeTooltip();
    }
  };
  const destroy = () =&gt; {
    closeTooltip(false);
    document.removeEventListener(&quot;pointerover&quot;, handlePointerOpen);
    document.removeEventListener(&quot;pointerout&quot;, handleLeave);
    document.removeEventListener(&quot;focusin&quot;, handleFocusIn);
    document.removeEventListener(&quot;focusout&quot;, handleLeave);
    document.removeEventListener(&quot;keydown&quot;, handleKeyDown);
    document.removeEventListener(&quot;contextmenu&quot;, handleContextMenu);
    tooltip = null;
  };

  document.addEventListener(&quot;pointerover&quot;, handlePointerOpen);
  document.addEventListener(&quot;pointerout&quot;, handleLeave);
  document.addEventListener(&quot;focusin&quot;, handleFocusIn);
  document.addEventListener(&quot;focusout&quot;, handleLeave);
  document.addEventListener(&quot;keydown&quot;, handleKeyDown);
  document.addEventListener(&quot;contextmenu&quot;, handleContextMenu);
  window.addEventListener(&quot;pagehide&quot;, destroy, { once: true });
})();
&lt;/script&gt;
&lt;script id=&quot;codex-visualization-lucide&quot; async src=&quot;https://unpkg.com/lucide@1.17.0/dist/umd/lucide.js&quot;&gt;&lt;/script&gt;
&lt;script&gt;
(() =&gt; {
  const initialize = () =&gt; {
    globalThis.lucide?.createIcons({ attrs: { width: 16, height: 16 } });
  };
  if (globalThis.lucide != null) {
    initialize();
    return;
  }
  document
    .getElementById(&quot;codex-visualization-lucide&quot;)
    ?.addEventListener(&quot;load&quot;, initialize, { once: true });
})();
&lt;/script&gt;
